name: Deploy Automatizado Local

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Baixar codigo atualizado
        uses: actions/checkout@v4

      - name: Reconstruir imagem do C# e reiniciar container
        run: docker compose build meu-app-mvc && docker compose up -d --force-recreate meu-app-mvc
